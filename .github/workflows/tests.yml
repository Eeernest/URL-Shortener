name: CI Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[test]"

      - name: Run Unit Tests
        env:
          PYTHONPATH: .
        run: pytest -m unit

      - name: Run Integration Tests
        env:
          PYTHONPATH: .
        run: pytest -m integration