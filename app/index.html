<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>URL Shortener</h1>

  <div>
    <h2>Shorten URL</h2>
    <input type="text" placeholder="Enter your long URL" id="js-long-url">
    <button onclick="shortenUrl()">Shorten</button>
    <p id="js-shorten-result"></p>
  </div>

  <div>
    <h2>Stats</h2>
    <input type="text" placeholder="Enter your short URL" id="js-short-url">
    <button onclick="showStats()">Show stats</button>
    <p id="js-stats-result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
